name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Build and Test API
      run: |
        cd chaptered-api
        npm install
        npm test || true
    - name: Build and Test Web
      run: |
        cd chaptered-web
        npm install
        npm run lint || true
        npm test || true
