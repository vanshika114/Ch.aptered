# GitHub Actions CI workflow to run build, lint, and tests on pull requests to main.
name: Chaptered CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chaptered-web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: chaptered-web

      - name: Run Linter
        run: npm run lint
        working-directory: chaptered-web

      - name: Build Frontend
        run: npm run build
        working-directory: chaptered-web

  lint-and-build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chaptered-api/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: chaptered-api

      - name: Build Backend
        run: npm run build
        working-directory: chaptered-api

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chaptered-web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: chaptered-web

      - name: Run Tests
        run: npm test
        working-directory: chaptered-web

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chaptered-api/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: chaptered-api

      - name: Run Tests
        run: npm test
        working-directory: chaptered-api
